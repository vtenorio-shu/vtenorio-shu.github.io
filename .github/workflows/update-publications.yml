name: Update Publications

on:
  schedule:
    # Runs every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch: # allows manual trigger

jobs:
  update-publications:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Fetch publications from Semantic Scholar
        run: python scripts/fetch_publications.py

      - name: Commit updated publications
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _data/publications.yml
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update publications [$(date +'%Y-%m-%d')]"
          git push
